---

#------------------------------------------------------------------------------
# YAML Aliases

anchorLinks:
  - thresholds: &thresholds-sin
      - { color: "green",  level: 0   }
      - { color: "orange", level: 50  }
      - { color: "red",    level: 100 }

#------------------------------------------------------------------------------
# Panel Config

cellIdPreamble: ""
gradientMode: "hue"
tagConfig:
  condensed: false
cells:

  SourceBox:
    dataRef: "test-data-small-sin"
    label:
      separator: "colon"
    #labelColor:
      #thresholds: *thresholds-sin
    fillColor:
      thresholds: *thresholds-sin

  DestinationBox:
    dataRef: "test-data-small-cos"
    label:
      separator: "colon"
    #labelColor:
      #thresholds: *thresholds-sin
    fillColor:
      thresholds: *thresholds-sin

  LinePath:
    dataRef: "test-data-small-sin"
    label:
      separator: "colon"
      units: "ops"
    labelColor:
      thresholds: *thresholds-sin
    flowAnimation:
      thresholdOffValue: 25
      thresholdLwrValue: 80
      thresholdLwrDurationSecs: 2
      thresholdUprValue: 180
      thresholdUprDurationSecs: 0.1
