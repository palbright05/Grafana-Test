---

#------------------------------------------------------------------------------
# YAML Aliases to simplify maintenance

anchorLinks:
  - link: &grafana-home
      url: "https://grafana.com/"
      params: "time"
  - thresholds: &thresholds-slow
      - {color: "red", level: 0}
      - {color: "green", level: 1}
      - {color: "red", level: 150}
  - thresholds: &thresholds-fast
      - {color: "green", level: 0}
      - {color: "orange", level: 200}
      - {color: "red", level: 600}
  - flowAnimation: &flowanim-slow
      thresholdOffValue: 2
      thresholdLwrValue: 10
      thresholdLwrDurationSecs: 1
      thresholdUprValue: 100
      thresholdUprDurationSecs: 0.1
  - flowAnimation: &flowanim-fast
      thresholdOffValue: 10
      thresholdLwrValue: 100
      thresholdLwrDurationSecs: 1
      thresholdUprValue: 600
      thresholdUprDurationSecs: 0.1

#------------------------------------------------------------------------------
# Panel Config

cellIdPreamble: "cell-"
gradientMode: "hue"
tagConfig:
  condensed: false
cells: 

  Sensors:
    dataRef: "test-data-small-sin"
    boxColor:
      color: "red"
    label:
      separator: "colon"
      #decimals: 2
      #units: "sec"
    labelColor:
      thresholds: *thresholds-slow
    #link: *grafana-home
  P:
    dataRef: "test-data-small-cos"
    label:
      separator: "colon"
      #decimals: 2
      #units: "ops"
    labelColor:
      thresholds: *thresholds-fast
    #link: *grafana-home
  Network:
    dataRef: "test-data-small-cos"
    label:
      separator: "space"
      #decimals: 2
      #units: "ops"
    labelColor:
      thresholds: *thresholds-fast
    #link: *grafana-home
  S-N:
    dataRef: "test-data-small-cos"
    flowAnimation: *flowanim-slow
