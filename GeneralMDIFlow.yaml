---

#------------------------------------------------------------------------------
# YAML Aliases to simplify maintenance

anchorLinks:
  - link: &grafana-home
      url: "https://grafana.com/"
      params: "time"
  - thresholds: &thresholds-slow
      - {color: "red", level: 0}
      - {color: "green", level: 1}
      - {color: "blue", level: 150}
  - thresholds: &thresholds-fast
      - {color: "green", level: 0}
      - {color: "orange", level: 200}
      - {color: "red", level: 600}
  - flowAnimation: &flowanim-slow
      thresholdOffValue: 2
      thresholdLwrValue: 10
      thresholdLwrDurationSecs: 1
      thresholdUprValue: 100
      thresholdUprDurationSecs: 0.1
  - flowAnimation: &flowanim-fast
      thresholdOffValue: 10
      thresholdLwrValue: 100
      thresholdLwrDurationSecs: 1
      thresholdUprValue: 600
      thresholdUprDurationSecs: 0.1

#------------------------------------------------------------------------------
# Panel Config

cellIdPreamble: "cell-"
gradientMode: "hue"
tagConfig:
  condensed: false
cells: 

  E-S3:
    dataRef: "test-data-small-cos"
    label:
      separator: "colon"
      units: "ops"
    labelColor:
      thresholds:
        - { color: "green", level: 0 }
        - { color: "orange", level: 50 }
        - { color: "red", level: 100 }
    boxColor:
      color: "lightblue"
    flowAnimation:
      thresholdOffValue: 20
      thresholdLwrValue: 40
      thresholdLwrDurationSecs: 1
      thresholdUprValue: 100
      thresholdUprDurationSecs: 0.1
