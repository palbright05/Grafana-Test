---

#------------------------------------------------------------------------------
# YAML Aliases to simplify maintenance

anchorLinks:
  - link: &grafana-home
      url: "https://grafana.com/"
      params: "time"
  - thresholds: &thresholds-slow
      - {color: "red", level: 0}
      - {color: "green", level: 1}

#------------------------------------------------------------------------------
# Panel Config

cellIdPreamble: "cell-"
gradientMode: "hue"
tagConfig:
  condensed: false
cells:
  SourceBox:
    dataRef: "test-data-small-sin"
    label:
      separator: "colon"
    labelColor:
      thresholds: *thresholds-slow

  LinePath:
    dataRef: "test-data-small-cos"
    label:
      separator: "colon"
      units: "ops"
    labelColor:
      thresholds:
        - { color: "green", level: 0 }
        - { color: "orange", level: 50 }
        - { color: "red", level: 100 }
    flowAnimation:
      thresholdOffValue: 20
      thresholdLwrValue: 40
      thresholdLwrDurationSecs: 1
      thresholdUprValue: 100
      thresholdUprDurationSecs: 0.1
